<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周老师 · 沉浸版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style-immersive.css">
</head>
<body>

  <!-- 隐私同意横幅 -->
  <div class="privacy-banner" id="privacyBanner" style="display:none;">
    <div class="privacy-banner-inner">
      <div class="privacy-banner-text">
        <strong>使用前请知悉</strong>：你的对话会发送给 AI（Anthropic Claude）生成回复，会话数据 24 小时后自动清除，不用于训练。
        本 AI <strong>不能替代专业心理治疗</strong>。
        <a href="/privacy.html" target="_blank">查看完整隐私政策</a>
      </div>
      <button class="privacy-banner-btn" id="privacyAcceptBtn">我已了解</button>
    </div>
  </div>

  <!-- 身份选择入口 -->
  <div class="welcome-modal" id="welcomeModal">
    <div class="welcome-content">
      <div class="welcome-logo">🌿</div>
      <h1 class="welcome-title">你好，我是哈佛家庭教育周老师</h1>
      <p class="welcome-subtitle">开始之前，让我先了解一下你</p>
      <div class="role-options">
        <button class="role-btn" data-role="parent">
          <div class="role-emoji">👨‍👩‍👧</div>
          <div class="role-label">我是家长</div>
          <div class="role-desc">想聊聊育儿、亲子、家庭</div>
        </button>
        <button class="role-btn" data-role="child">
          <div class="role-emoji">🌱</div>
          <div class="role-label">我是孩子</div>
          <div class="role-desc">想找一个懂我的人聊聊</div>
        </button>
      </div>
    </div>
  </div>

  <!-- 全屏头像背景 -->
  <div class="stage">
    <div class="stage-bg"></div>
    <div class="avatar-video-wrapper" id="videoWrapper" style="display:none;">
      <video id="avatarVideo" autoplay playsinline></video>
    </div>
    <div class="avatar-image-wrapper" id="imageWrapper">
      <img src="avatar.png" alt="周老师" class="avatar-img" id="avatarImg">
    </div>
    <div class="stage-gradient"></div>

    <!-- 顶部栏 -->
    <header class="top-bar">
      <div class="brand">
        <span class="brand-logo">🌿</span>
        <div>
          <div class="brand-name">哈佛家庭教育周老师</div>
          <div class="brand-sub">哈佛教育学 · 家庭关系专家 · 明日之屋创始人</div>
        </div>
      </div>
      <div class="top-right">
        <span class="version-switch usage-badge" id="usageBadge" title="今日剩余额度">今日剩余...</span>
        <button class="version-switch" id="changeRoleBtn" title="重新选择身份" style="border:1px solid var(--glass-border);background:var(--glass-bg);backdrop-filter:blur(20px);cursor:pointer;font-family:inherit;">换身份</button>
        <a href="/" class="version-switch" title="切换到经典版">经典版</a>
        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">检测中...</span>
        </div>
      </div>
    </header>

    <!-- 状态条：思考中/说话中 -->
    <div class="floating-status" id="avatarStatus">
      <span class="status-icon" id="statusIcon">💤</span>
      <span class="status-label" id="statusLabel">等待你的问题...</span>
      <button class="stop-btn" id="stopBtn" style="display:none;" title="停止说话">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="1"></rect>
        </svg>
        停止说话
      </button>
    </div>
  </div>

  <!-- 浮动对话面板 -->
  <section class="chat-panel" id="chatPanel">
    <button class="panel-toggle" id="panelToggle" title="收起/展开">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>

    <div class="chat-messages" id="chatMessages">
      <div class="message assistant-message">
        <div class="message-bubble">你好！我是周老师 😊 有什么想聊的，尽管问我。</div>
      </div>
    </div>

    <div class="quick-questions" id="quickQuestions">
      <button class="quick-btn" data-q="孩子不听话怎么办">孩子不听话</button>
      <button class="quick-btn" data-q="青春期叛逆">青春期</button>
      <button class="quick-btn" data-q="手机游戏上瘾">手机游戏</button>
      <button class="quick-btn" data-q="孩子情绪崩溃">情绪崩溃</button>
      <button class="quick-btn" data-q="推荐书籍">推荐书籍</button>
    </div>

    <div class="chat-input-area">
      <textarea
        id="chatInput"
        class="chat-input"
        placeholder="和周老师说点什么..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </div>
  </section>

  <script src="app.js"></script>
  <script>
    // 面板折叠
    const chatPanel = document.getElementById('chatPanel');
    const panelToggle = document.getElementById('panelToggle');
    panelToggle.addEventListener('click', () => {
      chatPanel.classList.toggle('collapsed');
    });

    // 身份选择
    const welcomeModal = document.getElementById('welcomeModal');
    const QUICK_QUESTIONS = {
      parent: [
        { label: '孩子不听话', q: '孩子不听话怎么办' },
        { label: '青春期', q: '青春期叛逆' },
        { label: '手机游戏', q: '手机游戏上瘾' },
        { label: '情绪崩溃', q: '孩子情绪崩溃' },
        { label: '推荐书籍', q: '推荐书籍' },
      ],
      child: [
        { label: '总内耗', q: '我总内耗怎么办' },
        { label: '感到焦虑', q: '我最近感到很焦虑' },
        { label: '未来方向', q: '我未来如何走' },
        { label: '我的优势', q: '我的优势在哪里' },
      ],
    };
    function updateGreeting(role) {
      const firstBubble = document.querySelector('.chat-messages .message-bubble');
      if (firstBubble) {
        firstBubble.textContent = role === 'parent'
          ? '你好 😊 我是哈佛家庭教育周老师。很高兴你愿意来聊聊。你今天想聊孩子的事，还是先聊聊你自己？'
          : '你好呀 🌱 我是周老师。有些话不方便和爸妈说，可以告诉我。我在这里，不评判你。你最近过得怎么样？';
      }
    }
    function updateQuickQuestions(role) {
      const container = document.getElementById('quickQuestions');
      if (!container) return;
      const items = QUICK_QUESTIONS[role] || QUICK_QUESTIONS.parent;
      container.innerHTML = items
        .map((item) => `<button class="quick-btn" data-q="${item.q}">${item.label}</button>`)
        .join('');
    }
    const savedRole = sessionStorage.getItem('userRole');
    if (savedRole) {
      welcomeModal.style.display = 'none';
      window.userRole = savedRole;
      updateGreeting(savedRole);
      updateQuickQuestions(savedRole);
    }
    // 隐私同意横幅
    const privacyBanner = document.getElementById('privacyBanner');
    if (!localStorage.getItem('privacyAccepted')) {
      privacyBanner.style.display = 'block';
    }
    document.getElementById('privacyAcceptBtn').addEventListener('click', () => {
      localStorage.setItem('privacyAccepted', '1');
      privacyBanner.style.display = 'none';
    });

    // 手动换身份按钮
    const changeRoleBtn = document.getElementById('changeRoleBtn');
    if (changeRoleBtn) {
      changeRoleBtn.addEventListener('click', async () => {
        sessionStorage.removeItem('userRole');
        window.userRole = null;
        try { await fetch('/api/reset', { method: 'POST' }); } catch {}
        welcomeModal.classList.remove('hide');
        welcomeModal.style.display = 'flex';
      });
    }

    document.querySelectorAll('.role-btn').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const role = btn.dataset.role;
        const oldRole = sessionStorage.getItem('userRole');
        sessionStorage.setItem('userRole', role);
        window.userRole = role;
        welcomeModal.classList.add('hide');
        setTimeout(() => welcomeModal.style.display = 'none', 400);

        // 切换身份时清空服务器端对话历史 + 前端聊天气泡
        if (oldRole && oldRole !== role) {
          try { await fetch('/api/reset', { method: 'POST' }); } catch {}
          const msgs = document.getElementById('chatMessages');
          if (msgs) {
            msgs.innerHTML = '<div class="message assistant-message"><div class="message-bubble"></div></div>';
          }
        }

        updateGreeting(role);
        updateQuickQuestions(role);
      });
    });
  </script>
</body>
</html>
